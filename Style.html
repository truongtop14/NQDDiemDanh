<style>

/* ===============================
   BODY
================================ */

body{

    background:#f4f6f9;

    font-family:"Segoe UI",Arial,sans-serif;

    color:#1f2937;

}

/* ===============================
   HEADER
================================ */

h2{

    font-weight:700;

}

#updateTime{

    font-size:14px;

    color:#6b7280;

}

/* ===============================
   CARD
================================ */

.card{

    border:none;

    border-radius:18px;

    overflow:hidden;

    box-shadow:0 4px 12px rgba(0,0,0,.08);

}

.card-header{

    background:#ffffff;

    font-weight:bold;

    font-size:17px;

    border-bottom:1px solid #e5e7eb;

}

/* ===============================
   CARD THỐNG KÊ
================================ */

.stat-card{

    color:#fff;

    cursor:pointer;

    transition:.25s;

}

.stat-card:hover{

    transform:translateY(-5px);

    box-shadow:0 10px 18px rgba(0,0,0,.18);

}

.number{

    margin-top:10px;

    font-size:34px;

    font-weight:bold;

}

/* ===============================
   MÀU CARD
================================ */

.bg-total{

    background:linear-gradient(135deg,#2563eb,#1d4ed8);

}

/* Đúng giờ */

.bg-ontime{

    background:linear-gradient(135deg,#16a34a,#15803d);

}

/* Trễ có phép */

.bg-late-ok{

    background:linear-gradient(135deg,#16a34a,#15803d);

}

/* Trễ không phép */

.bg-late-no{

    background:linear-gradient(135deg,#ef4444,#dc2626);

}

/* Vắng có phép */

.bg-absent-ok{

    background:linear-gradient(135deg,#16a34a,#15803d);

}

/* Vắng không phép */

.bg-absent-no{

    background:linear-gradient(135deg,#ef4444,#b91c1c);

}

/* ===============================
   FORM
================================ */

.form-control,

.form-select{

    height:46px;

    border-radius:12px;

}

.btn{

    height:46px;

    border-radius:12px;

    font-weight:bold;

}

/* ===============================
   TABLE
================================ */
.table{

    margin-bottom:0;

    border-collapse:collapse;

}

.table-bordered{

    border:1px solid #dee2e6;

}

.table-bordered th,
.table-bordered td{

    border:1px solid #dee2e6;

}

.table thead th{

    background:#2563eb;

    color:#fff;

    text-align:center;

    vertical-align:middle;

}

.table tbody td{

    vertical-align:middle;

    text-align:center;

}

.table tbody td:nth-child(3){

    text-align:left;
    font-weight:600;

}

.table tbody td:nth-child(4){

    text-align:left;

}

.table-hover tbody tr:hover{

    background:#eef6ff;

}
* ===============================
   BADGE
================================ */

.badge{

    font-size:13px;

    padding:8px 12px;

    border-radius:20px;

    font-weight:600;

}

.bg-success{

    background:#16a34a !important;

}

.bg-danger{

    background:#dc2626 !important;

}

.bg-warning{

    background:#f59e0b !important;

    color:#111827 !important;

}

.bg-primary{

    background:#2563eb !important;

}

/* ===============================
   THỐNG KÊ THEO LỚP
================================ */

#classSummaryBody td{

    text-align:center;

}

#classSummaryBody td:first-child{

    text-align:left;

    font-weight:600;

}

#classSummaryBody tr:hover{

    background:#f8fafc;

}

/* ===============================
   DANH SÁCH ĐIỂM DANH
================================ */

#tableBody td:nth-child(3){

    font-weight:600;

}

#tableBody td:nth-child(4){

    color:#374151;

}

/* ===============================
   SCROLLBAR
================================ */

::-webkit-scrollbar{

    width:10px;

    height:10px;

}

::-webkit-scrollbar-thumb{

    background:#cbd5e1;

    border-radius:10px;

}

::-webkit-scrollbar-thumb:hover{

    background:#94a3b8;

}

/* ===============================
   RESPONSIVE
================================ */

@media(max-width:992px){

    .number{

        font-size:28px;

    }

}

@media(max-width:768px){

    .container-fluid{

        padding:15px !important;

    }

    .number{

        font-size:24px;

    }

    h2{

        font-size:24px;

    }

    .table{

        font-size:14px;

    }

}

</style>
