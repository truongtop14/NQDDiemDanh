<!DOCTYPE html>
<html>

<head>
  <base target="_top">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
      background:#f5f5f5;
    }

    .card{
      border-radius:15px;
    }
  </style>

</head>

<body>

<div class="container mt-4">

<h2 class="text-center mb-4">
📋 Dashboard Điểm Danh
</h2>

<div class="row mb-4">

<div class="col">
<div class="card text-center">
<div class="card-body">
<h6>Tổng điểm danh</h6>
<h2 id="total">0</h2>
</div>
</div>
</div>

<div class="col">
<div class="card text-center">
<div class="card-body">
<h6>Đúng giờ</h6>
<h2 class="text-success" id="ontime">0</h2>
</div>
</div>
</div>

<div class="col">
<div class="card text-center">
<div class="card-body">
<h6>Đi trễ</h6>
<h2 class="text-danger" id="late">0</h2>
</div>
</div>
</div>

</div>

<!-- Bộ lọc -->
<div class="row mb-3">

  <div class="col-md-4">
    <label class="form-label fw-bold">Lọc theo lớp</label>
    <select class="form-select" id="classFilter" onchange="filterClass()">
      <option value="ALL">Tất cả lớp</option>
    </select>
  </div>

</div>

<table class="table table-bordered table-striped">

<thead class="table-dark">
<tr>
<th>#</th>
<th>Họ tên</th>
<th>Lớp</th>
<th>Ngày</th>
<th>Giờ điểm danh</th>
<th>Trạng thái</th>
<th>Trễ (phút)</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

</div>
<script>

let allData=[];

google.script.run
.withSuccessHandler(init)
.getAttendance();

function init(data){

    allData=data.list;

    // Danh sách lớp
    let classes=[...new Set(allData.map(x=>x.className))].sort();

    let select=document.getElementById("classFilter");

    classes.forEach(c=>{
        select.innerHTML+=`<option value="${c}">${c}</option>`;
    });

    filterClass();

}

function filterClass(){

    let cls=document.getElementById("classFilter").value;

    // ngày hiện tại
    let today=new Date();

    let d=("0"+today.getDate()).slice(-2);
    let m=("0"+(today.getMonth()+1)).slice(-2);
    let y=today.getFullYear();

    let todayStr=`${d}/${m}/${y}`;

    let list=allData.filter(x=>x.date===todayStr);

    if(cls!="ALL"){
        list=list.filter(x=>x.className===cls);
    }

    // Thống kê
    document.getElementById("total").innerHTML=list.length;
    document.getElementById("ontime").innerHTML=
        list.filter(x=>x.status=="Đúng giờ").length;

    document.getElementById("late").innerHTML=
        list.filter(x=>x.status=="Đi trễ").length;

    render(list);

}

function render(list){

    let html="";

    list.forEach((x,i)=>{

        html+=`
        <tr>
            <td>${i+1}</td>
            <td>${x.name}</td>
            <td>${x.className}</td>
            <td>${x.date}</td>
            <td>${x.time}</td>
            <td>
                ${
                    x.status=="Đi trễ"
                    ?'<span class="badge bg-danger">Đi trễ</span>'
                    :'<span class="badge bg-success">Đúng giờ</span>'
                }
            </td>
            <td>${x.lateMinute}</td>
        </tr>
        `;

    });

    document.getElementById("tbody").innerHTML=html;

}

</script>
</body>

</html>
